<!doctype html>
<html lang="en">
  <body>
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="subject" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <form name="enrollment" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="enrollment" />
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="course_title" />
      <input type="text" name="course_price" />
      <input type="text" name="course_duration" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <form name="orders" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="orders" />
      <input type="text" name="customer_name" />
      <input type="email" name="customer_email" />
      <input type="text" name="customer_phone" />
      <input type="text" name="city" />
      <input type="text" name="delivery_type" />
      <input type="text" name="delivery_address" />
      <input type="text" name="courier" />
      <input type="text" name="payment_method" />
      <textarea name="items"></textarea>
      <input type="text" name="agreed_to_terms" />
      <input type="text" name="agreed_to_privacy" />
      <input type="text" name="subtotal" />
      <input type="text" name="shipping_cost" />
      <input type="text" name="total" />
      <input type="text" name="bot-field" />
    </form>
    <form name="reviews" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="reviews" />
      <input type="text" name="author_name" />
      <input type="text" name="rating" />
      <textarea name="comment"></textarea>
      <input type="text" name="course_title" />
      <input type="text" name="author_image" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
